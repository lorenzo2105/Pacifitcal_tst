name: pacifitcal
description: Application mobile CrossFit - Gestion des cours et abonnements
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localisation
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_app_check: ^0.2.1+7  # Protection anti-bot et CSRF
  # firebase_messaging: ^14.7.9  # Temporairement désactivé - nécessite Google Play Services
  # firebase_analytics: ^10.8.0  # Temporairement désactivé - cause crash dans émulateur
  cloud_functions: ^4.6.0

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.0.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  intl: ^0.20.2

  # Utils
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
